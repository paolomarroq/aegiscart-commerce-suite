{% extends "base.html" %}

{% block title %}Checkout exitoso · AegisCart{% endblock %}

{% block content %}
<section class="result-panel success-result">
    <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="AegisCart">
    <p class="eyebrow">checkout_success</p>
    <h1>Checkout completado</h1>
    <p>{{ message }}</p>
    {% if order_id %}<span class="mono">ORD-{{ order_id }}</span>{% endif %}
    <div class="heading-actions">
        <a class="btn btn-primary" href="{{ url_for('order_detail', order_id=order_id) }}">Ver orden</a>
        <a class="btn btn-ghost" href="{{ url_for('logs_view') }}">Ver logs</a>
    </div>
</section>
{% endblock %}
